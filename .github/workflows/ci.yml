name: CI

on:
  push:
    branches:
      - dev
      - master
      - main
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test,dev]"
          python -m pip install twine

      - name: Run Ruff
        run: python -m ruff check src tests

      - name: Run mypy
        run: python -m mypy src

      - name: Run package tests
        run: PYTHONPATH=src python -m pytest -q --cov=src/tradinglab_data --cov-report=term-missing --cov-fail-under=85 -m "not network" tests

      - name: Smoke-check schema CLI
        run: PYTHONPATH=src python -m tradinglab_data.cli schema --format markdown

      - name: Build artifacts
        run: python -m build

      - name: Check built distributions
        run: python -m twine check dist/*

  wheel-install-smoke:
    needs: test-and-build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build --wheel

      - name: Install built wheel
        run: python -m pip install dist/*.whl

      - name: Smoke-check installed package imports
        run: |
          python - <<'PY'
          import tradinglab_data
          from tradinglab_data.schema import compatibility_manifest

          manifest = compatibility_manifest()
          assert manifest["package_name"] == "tradinglab-data"
          assert manifest["dataframe_policy"] == "polars-first"
          assert manifest["artifact_schema_version"].startswith("v")
          assert tradinglab_data.DATAFRAME_POLICY == "polars-first"
          print(manifest["artifact_schema_version"])
          print(manifest["dataframe_policy"])
          print(tradinglab_data.__name__)
          PY

      - name: Smoke-check installed CLI
        run: |
          tradinglab-data --help
          python -m tradinglab_data.cli schema --format markdown
